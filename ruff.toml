target-version = "py312"
line-length = 88

# Only check project Python code, not venvs or node_modules
extend-exclude = [
    "backend/.venv",
    "pipeline/venv",
    "node_modules",
]

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes (F401 unused imports, F841 unused variables)
    "I",   # isort (import sorting)
    "UP",  # pyupgrade (modern Python syntax)
]
# F401 and F841 are NOT in fixable — ruff will error, not auto-fix
fixable = ["I", "E", "W", "UP"]
unfixable = ["F401", "F841"]

[lint.per-file-ignores]
# SQLAlchemy models use string forward references resolved at runtime
"backend/api/models/*.py" = ["F821"]
# Pipeline has long prompt strings and is a separate project
"pipeline/*.py" = ["E501"]

[format]
quote-style = "double"
indent-style = "space"
