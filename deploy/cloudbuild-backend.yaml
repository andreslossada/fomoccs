steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --platform=linux/amd64
      - -t
      - us-central1-docker.pkg.dev/fomoccs-caracas/fomoccs-docker/backend:${_SHORT_SHA}
      - .
images:
  - us-central1-docker.pkg.dev/fomoccs-caracas/fomoccs-docker/backend:${_SHORT_SHA}
substitutions:
  _SHORT_SHA: latest
